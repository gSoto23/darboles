version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: darboles_user
      POSTGRES_PASSWORD: darboles_password
      POSTGRES_DB: darboles_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darboles_user -d darboles_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://darboles_user:darboles_password@db/darboles_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
